{% extends "base_view.html" %}

{% block content %}
    <h1>Create Task</h1>

    <form method="post">
        {% csrf_token %}
        <label>Name</label>
        {{ form.name }}

        <label>Description</label>
        {{ form.description }}

        <label>Completed</label>
        {{ form.status }}

        <label>List</label>
        {{ form.task_list }}

        <button type="submit">Create</button>
    </form>
{% endblock %}
