{% extends "base_view.html" %}

{% block content %}
    <h1>Create Task</h1>

    <form method="post">
        {% csrf_token %}
        <label>Name</label>
        {{ form.name }}<br>

        <label>Description</label>
        {{ form.description }}<br>

        <label>List</label>
        {{ form.task_list }}<br>

        <button type="submit">Create</button>
    </form>
{% endblock %}
