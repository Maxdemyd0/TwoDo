{% extends "base_view.html" %}
{% load static %}

{% block content %}

<h2>Share "{{ task_list.name }}"</h2>

<form method="POST">
    {% csrf_token %}

    <select name="friend_id">
        {% for friend in friends %}
            <option value="{{ friend.id }}">
                {{ friend.username }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Share</button>
</form>

{% endblock %}
