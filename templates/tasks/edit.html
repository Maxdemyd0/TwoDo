{% extends "base_view.html" %}

{% block content %}
    <h1>Edit Task</h1>

    <form method="post">
        {% csrf_token %}
        <label>Name</label>
        {{ form.name }}

        <label>Description</label>
        {{ form.description }}

        <label>List</label>
        {{ form.task_list }}

        <button type="submit">Save Changes</button>
    </form>
{% endblock %}
