{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TwoDo{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style/styles.css' %}">
</head>
<body>

{% if messages %}
    {% for message in messages %}
        <p class="{{ message.tags }}">{{ message }}</p>
    {% endfor %}
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
