{% extends "base_view.html" %}

{% block content %}
<h1>Your Task Lists</h1>

<a href="{% url 'create_list' %}">
    <button>Create New List</button>
</a>

<ul>
    {% for list in lists %}
        <li>
            <a href="{% url 'list_detail' list.id %}">
                {{ list.name }}
            </a>
        </li>
    {% empty %}
        <li>No lists yet 🎉</li>
    {% endfor %}
</ul>
{% endblock %}
